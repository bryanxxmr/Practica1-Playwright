name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 0" # Weekly on Sunday at 2 AM UTC
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (JSON)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 14

      - name: Upload trace and videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: trace-and-videos-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  merge-reports:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    if: always()
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Create comprehensive test summary
        if: always()
        run: |
          echo "=== Consolidating Test Results ===" 
          mkdir -p allure-report

          # Copy all Playwright reports to a single location for easy access
          cp -r all-artifacts/playwright-report-chromium allure-report/chromium 2>/dev/null || true
          cp -r all-artifacts/playwright-report-firefox allure-report/firefox 2>/dev/null || true
          cp -r all-artifacts/playwright-report-webkit allure-report/webkit 2>/dev/null || true

          # Create an index.html that shows available reports
          cat > allure-report/index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Playwright Test Reports</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
              }
              .container {
                background: white;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                padding: 50px 40px;
                max-width: 700px;
                width: 100%;
              }
              h1 {
                color: #333;
                margin-bottom: 10px;
                font-size: 32px;
              }
              .subtitle {
                color: #666;
                margin-bottom: 40px;
                font-size: 15px;
              }
              .report-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 15px;
                margin-bottom: 30px;
              }
              .report-link {
                display: block;
                padding: 20px 24px;
                background: #f0f4ff;
                border: 2px solid #667eea;
                border-radius: 8px;
                text-decoration: none;
                color: #333;
                transition: all 0.3s;
                font-weight: 500;
              }
              .report-link:hover {
                background: #667eea;
                color: white;
                transform: translateX(5px);
              }
              .report-icon {
                margin-right: 12px;
                font-size: 20px;
              }
              .info-box {
                background: #fff3cd;
                border-left: 4px solid #ffc107;
                padding: 15px;
                border-radius: 4px;
                margin-bottom: 20px;
                font-size: 14px;
                color: #856404;
              }
              .success { color: #28a745; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🧪 Playwright Test Reports</h1>
              <div class="subtitle">OrangeHRM Automation - Multi-Browser Results</div>
              
              <div class="info-box">
                <strong>✅ Test Status:</strong> All reports generated successfully. Click on a browser to view detailed results.
              </div>
              
              <div class="report-grid">
                <a href="./chromium/index.html" class="report-link" target="_blank">
                  <span class="report-icon">🔵</span> Chromium Report
                </a>
                <a href="./firefox/index.html" class="report-link" target="_blank">
                  <span class="report-icon">🔶</span> Firefox Report
                </a>
                <a href="./webkit/index.html" class="report-link" target="_blank">
                  <span class="report-icon">🐍</span> WebKit Report
                </a>
              </div>
              
              <div style="font-size: 13px; color: #666; border-top: 1px solid #e0e0e0; padding-top: 20px;">
                <strong>How to use:</strong><br>
                1. Download the allure-report artifact from GitHub Actions<br>
                2. Extract the ZIP file<br>
                3. Open <strong>index.html</strong> in your browser<br>
                4. Click on any browser to view its detailed report
              </div>
            </div>
          </body>
          </html>
          INDEXEOF

          echo "Report index created successfully"
        shell: bash

      - name: Upload merged Playwright reports
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports-all-browsers
          path: all-artifacts/playwright-report-*/
          retention-days: 14
        continue-on-error: true

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
        continue-on-error: true

      - name: Generate Test Summary for GitHub Actions
        if: always()
        run: |
          echo "# 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Reports Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count test results files
          chromium_count=$(find all-artifacts/test-results-chromium -name "results.json" | wc -l)
          firefox_count=$(find all-artifacts/test-results-firefox -name "results.json" | wc -l)
          webkit_count=$(find all-artifacts/test-results-webkit -name "results.json" | wc -l)

          if [ "$chromium_count" -gt 0 ]; then
            echo "- 🔵 **Chromium** - Tests executed ✅" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$firefox_count" -gt 0 ]; then
            echo "- 🔶 **Firefox** - Tests executed ✅" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$webkit_count" -gt 0 ]; then
            echo "- 🐍 **WebKit** - Tests executed ✅" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 How to View Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **Download Artifact:** Download \`allure-report\` from the artifacts section" >> $GITHUB_STEP_SUMMARY
          echo "2. **Extract:** Unzip the downloaded file" >> $GITHUB_STEP_SUMMARY
          echo "3. **Open:** Open \`index.html\` in your web browser" >> $GITHUB_STEP_SUMMARY
          echo "4. **Navigate:** Click on the browser (Chromium, Firefox, or WebKit) to view detailed results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Available Reports" >> $GITHUB_STEP_SUMMARY
          echo "- 🎨 **Playwright HTML Reports** - Download: \`allure-report\` (comprehensive test details)" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 **JSON Results** - Download: \`test-results-*\` (raw data)" >> $GITHUB_STEP_SUMMARY
          echo "- 🎬 **Videos & Traces** - Download: \`test-results-*\` (on failure)" >> $GITHUB_STEP_SUMMARY
        shell: bash
