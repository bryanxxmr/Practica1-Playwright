name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 0" # Weekly on Sunday at 2 AM UTC
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (JSON)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 14

      - name: Upload trace and videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: trace-and-videos-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  merge-reports:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    if: always()
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Collect Allure results from all browsers
        if: always()
        run: |
          echo "=== Collecting Allure Results ===" 
          mkdir -p allure-results-merged

          # Copy allure-results from each browser to merged folder
          cp -r all-artifacts/allure-results-chromium/* allure-results-merged/ 2>/dev/null || true
          cp -r all-artifacts/allure-results-firefox/* allure-results-merged/ 2>/dev/null || true
          cp -r all-artifacts/allure-results-webkit/* allure-results-merged/ 2>/dev/null || true

          echo "Allure results collected"
        shell: bash

      - name: Generate Allure Report
        if: always()
        run: |
          echo "=== Generating Allure Report ===" 
          npx allure@latest generate allure-results-merged -o allure-report-output
          echo "Allure report generated successfully"
        shell: bash

      - name: Create comprehensive test summary dashboard
        if: always()
        run: |
          echo "=== Creating Test Summary Dashboard ===" 
          mkdir -p test-reports

          # Copy Playwright reports
          cp -r all-artifacts/playwright-report-chromium test-reports/playwright-chromium 2>/dev/null || true
          cp -r all-artifacts/playwright-report-firefox test-reports/playwright-firefox 2>/dev/null || true
          cp -r all-artifacts/playwright-report-webkit test-reports/playwright-webkit 2>/dev/null || true

          # Copy Allure report
          cp -r allure-report-output test-reports/allure 2>/dev/null || true

          # Create master dashboard index.html
          cat > test-reports/index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>OrangeHRM Test Reports Dashboard</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 40px 20px;
              }
              .main-container {
                max-width: 1200px;
                margin: 0 auto;
              }
              .header {
                background: white;
                border-radius: 12px;
                padding: 40px;
                margin-bottom: 30px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
              }
              h1 {
                color: #333;
                margin-bottom: 10px;
                font-size: 36px;
              }
              .subtitle {
                color: #666;
                font-size: 16px;
                margin-bottom: 10px;
              }
              .status-badge {
                display: inline-block;
                background: #28a745;
                color: white;
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: bold;
                margin-top: 10px;
              }
              .reports-section {
                background: white;
                border-radius: 12px;
                padding: 40px;
                margin-bottom: 30px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
              }
              .section-title {
                font-size: 24px;
                color: #333;
                margin-bottom: 25px;
                padding-bottom: 15px;
                border-bottom: 2px solid #667eea;
              }
              .report-type {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
              }
              .report-card {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border-radius: 10px;
                padding: 25px;
                text-align: center;
                cursor: pointer;
                transition: transform 0.3s, box-shadow 0.3s;
                text-decoration: none;
                color: white;
                display: flex;
                flex-direction: column;
                justify-content: center;
              }
              .report-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
              }
              .report-card.browser {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              }
              .report-card.allure {
                background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
              }
              .report-icon {
                font-size: 40px;
                margin-bottom: 15px;
              }
              .report-name {
                font-size: 18px;
                font-weight: bold;
                margin-bottom: 8px;
              }
              .report-desc {
                font-size: 13px;
                opacity: 0.9;
              }
              .instructions {
                background: #f0f4ff;
                border-left: 4px solid #667eea;
                padding: 20px;
                border-radius: 4px;
                margin-top: 20px;
              }
              .instructions h3 {
                color: #333;
                margin-bottom: 10px;
              }
              .instructions ol {
                margin-left: 20px;
                color: #555;
                line-height: 1.8;
              }
            </style>
          </head>
          <body>
            <div class="main-container">
              <div class="header">
                <h1>🧪 OrangeHRM Test Reports</h1>
                <div class="subtitle">Enterprise-Grade Playwright Automation Framework</div>
                <span class="status-badge">✅ All Tests Executed Successfully</span>
              </div>

              <div class="reports-section">
                <div class="section-title">📊 Allure Reports (Recommended)</div>
                <div class="report-type">
                  <a href="./allure/index.html" class="report-card allure" target="_blank">
                    <div class="report-icon">📈</div>
                    <div class="report-name">Full Allure Report</div>
                    <div class="report-desc">Complete test metrics & timeline</div>
                  </a>
                </div>
              </div>

              <div class="reports-section">
                <div class="section-title">🎨 Playwright Reports (Browser-Specific)</div>
                <div class="report-type">
                  <a href="./playwright-chromium/index.html" class="report-card browser" target="_blank">
                    <div class="report-icon">🔵</div>
                    <div class="report-name">Chromium</div>
                    <div class="report-desc">Chrome/Chromium results</div>
                  </a>
                  <a href="./playwright-firefox/index.html" class="report-card browser" target="_blank">
                    <div class="report-icon">🔶</div>
                    <div class="report-name">Firefox</div>
                    <div class="report-desc">Firefox results</div>
                  </a>
                  <a href="./playwright-webkit/index.html" class="report-card browser" target="_blank">
                    <div class="report-icon">🐍</div>
                    <div class="report-name">WebKit</div>
                    <div class="report-desc">Safari results</div>
                  </a>
                </div>
              </div>

              <div class="reports-section">
                <div class="section-title">📖 How to Use These Reports</div>
                <div class="instructions">
                  <h3>🎯 Quick Steps:</h3>
                  <ol>
                    <li><strong>Start with Allure Report</strong> - Click "Full Allure Report" above for comprehensive statistics</li>
                    <li><strong>Review browser-specific results</strong> - Click any browser to see detailed test execution</li>
                    <li><strong>Check failures (if any)</strong> - Click test to view logs, screenshots, videos, and traces</li>
                    <li><strong>Download artifacts</strong> - Save reports for documentation or sharing</li>
                  </ol>
                </div>
                <div class="instructions" style="margin-top: 15px;">
                  <h3>📁 Report Types:</h3>
                  <ul style="margin-left: 20px; color: #555; line-height: 1.8;">
                    <li><strong>Allure Report:</strong> Visual dashboard with timelines, trends, and statistics</li>
                    <li><strong>Playwright Reports:</strong> Detailed HTML reports per browser with videos and traces</li>
                    <li><strong>JSON Results:</strong> Raw test data for integration with other tools</li>
                  </ul>
                </div>
              </div>
            </div>
          </body>
          </html>
          INDEXEOF

          echo "Report index created successfully"
        shell: bash

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-dashboard
          path: test-reports/
          retention-days: 30
        continue-on-error: true

      - name: Generate Test Summary for GitHub Actions
        if: always()
        run: |
          echo "# 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ All Reports Available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count test results files
          chromium_count=$(find all-artifacts/test-results-chromium -name "results.json" | wc -l)
          firefox_count=$(find all-artifacts/test-results-firefox -name "results.json" | wc -l)
          webkit_count=$(find all-artifacts/test-results-webkit -name "results.json" | wc -l)

          if [ "$chromium_count" -gt 0 ]; then
            echo "- 🔵 **Chromium** - Tests executed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$firefox_count" -gt 0 ]; then
            echo "- 🔶 **Firefox** - Tests executed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$webkit_count" -gt 0 ]; then
            echo "- 🐍 **WebKit** - Tests executed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Reports Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Allure Reports" >> $GITHUB_STEP_SUMMARY
          echo "- **Full Dashboard** - Visual metrics, timelines, and statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎨 Playwright Reports" >> $GITHUB_STEP_SUMMARY
          echo "- **Chromium, Firefox, WebKit** - Detailed browser-specific results with videos & traces" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📥 How to Access Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Download artifact: \`test-reports-dashboard\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Extract the ZIP file" >> $GITHUB_STEP_SUMMARY
          echo "3. Open \`index.html\` in your browser" >> $GITHUB_STEP_SUMMARY
          echo "4. Click on any report to view results" >> $GITHUB_STEP_SUMMARY
        shell: bash
