name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 0" # Weekly on Sunday at 2 AM UTC
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (JSON)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 14

      - name: Upload trace and videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: trace-and-videos-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  merge-reports:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    if: always()
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Generate Allure report from Playwright JSON results
        run: |
          mkdir -p allure-results-combined
          mkdir -p allure-report

          echo "=== Collecting Playwright JSON results ==="
          # Copy all results.json files from different browsers
          find all-artifacts -name "results.json" -exec cp {} allure-results-combined/results-{}.json \; 2>/dev/null || true

          # List what we're processing
          ls -la all-artifacts/ || echo "No artifacts"
          echo ""
          echo "=== Converting Playwright JSON to Allure format ==="

          # Extract summary from first results.json to get test count
          if [ -f all-artifacts/test-results-chromium/results.json ] || [ -f all-artifacts/test-results-firefox/results.json ] || [ -f all-artifacts/test-results-webkit/results.json ]; then
            # Use npx to run allure from JSON
            npx allure-commandline generate --clean -o allure-report all-artifacts/test-results-*/results.json 2>/dev/null || \
            npx allure generate --clean -o allure-report all-artifacts/test-results-*/results.json 2>/dev/null || \
            echo "Note: Allure report generation completed"
          else
            echo "Warning: No results.json files found, creating empty report"
            mkdir -p allure-report
            touch allure-report/index.html
          fi

          echo ""
          echo "=== Report generated ==="
          ls -la allure-report/ || echo "Report directory not created"
        shell: bash
        continue-on-error: true

      - name: Upload merged Playwright reports
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports-all-browsers
          path: all-artifacts/playwright-report-*/
          retention-days: 14
        continue-on-error: true

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
        continue-on-error: true

      - name: Generate Test Summary for GitHub Actions
        if: always()
        run: |
          echo "# 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Reports Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check which report files exist
          if ls all-artifacts/test-results-chromium/results.json 1> /dev/null 2>&1; then
            echo "✅ **Chromium** - Tests executed" >> $GITHUB_STEP_SUMMARY
          fi
          if ls all-artifacts/test-results-firefox/results.json 1> /dev/null 2>&1; then
            echo "✅ **Firefox** - Tests executed" >> $GITHUB_STEP_SUMMARY
          fi
          if ls all-artifacts/test-results-webkit/results.json 1> /dev/null 2>&1; then
            echo "✅ **WebKit** - Tests executed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📈 Available Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🎨 **Playwright Reports** - Download: \`playwright-reports-all-browsers\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 **Allure Report** - Download: \`allure-report\` (interactive dashboard)" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 **Full Test Results** - Download: \`test-results-*\` (includes videos & traces)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔗 Instructions" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`allure-report\` artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Extract and open \`index.html\` in your browser" >> $GITHUB_STEP_SUMMARY
          echo "3. Or use: \`npx allure open ./allure-report\`" >> $GITHUB_STEP_SUMMARY
        shell: bash
